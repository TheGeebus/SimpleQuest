; --- 0.4.0 SimpleQuest namespace consolidation: redirects ---
; Existing pre-0.4.0 QuestPrereqGroup → QuestPrereqRule chain (from prior rename) updated to point at the new
; SimpleQuest.QuestPrereqRule destination directly. Redirect-chains accumulate, so collapse to single hop here.
+GameplayTagRedirects=(OldTagName="QuestPrereqGroup",NewTagName="SimpleQuest.QuestPrereqRule")
+GameplayTagRedirects=(OldTagName="QuestPrereqGroup.GroupA",NewTagName="SimpleQuest.QuestPrereqRule.GroupA")
; Namespace roots — covers parent-tag references in any authored asset.
+GameplayTagRedirects=(OldTagName="Quest",NewTagName="SimpleQuest.Quest")
+GameplayTagRedirects=(OldTagName="Quest.Outcome",NewTagName="SimpleQuest.QuestOutcome")
+GameplayTagRedirects=(OldTagName="QuestState",NewTagName="SimpleQuest.QuestState")
+GameplayTagRedirects=(OldTagName="QuestPrereqRule",NewTagName="SimpleQuest.QuestPrereqRule")
+GameplayTagRedirects=(OldTagName="QuestActivationGroup",NewTagName="SimpleQuest.QuestActivationGroup")
; Seeded child tags — UE GameplayTagRedirects are exact-match per tag string (children of a redirected
; parent are NOT auto-rewritten), so each seeded tag needs its own explicit redirect for asset migration.
+GameplayTagRedirects=(OldTagName="Quest.Outcome.LostPartner.Quit",NewTagName="SimpleQuest.QuestOutcome.LostPartner.Quit")
+GameplayTagRedirects=(OldTagName="Quest.Outcome.Solved",NewTagName="SimpleQuest.QuestOutcome.Solved")
+GameplayTagRedirects=(OldTagName="Quest.Outcome.Triumph",NewTagName="SimpleQuest.QuestOutcome.Triumph")
+GameplayTagRedirects=(OldTagName="Quest.Outcome.Victory",NewTagName="SimpleQuest.QuestOutcome.Victory")
+GameplayTagRedirects=(OldTagName="QuestActivationGroup.Group1",NewTagName="SimpleQuest.QuestActivationGroup.Group1")
+GameplayTagRedirects=(OldTagName="QuestActivationGroup.Group2",NewTagName="SimpleQuest.QuestActivationGroup.Group2")
+GameplayTagRedirects=(OldTagName="QuestPrereqRule.GroupB",NewTagName="SimpleQuest.QuestPrereqRule.GroupB")
+GameplayTagRedirects=(OldTagName="QuestPrereqRule.GroupC",NewTagName="SimpleQuest.QuestPrereqRule.GroupC")
+GameplayTagRedirects=(OldTagName="QuestPrereqRule.TestGroup",NewTagName="SimpleQuest.QuestPrereqRule.TestGroup")
