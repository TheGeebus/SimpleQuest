; --- 0.4.0 per-node state-fact migration: "Outcome" to "Path" ---
; The compiler now emits per-node completion facts as SimpleQuest.QuestState.<NodePath>.Path.<X>
; (was .Outcome.<X> pre-0.4.0). The recommended migration path is to run Compile All Questlines and then Save All:
; the runtime emits the new shape and any compiler-baked references on questline assets are rewritten in place.
;
; If you have Blueprint or C++ code holding direct FGameplayTag references to the legacy state-fact tags
; (i.e., calling WorldState->HasFact on a hand-authored .Outcome. tag rather than going through the
; SimpleQuestBlueprintLibrary helpers), redirects can preserve the references on load. UE GameplayTagRedirects
; are exact-string per tag, so each affected tag needs its own line. Template:
;
;   +GameplayTagRedirects=(OldTagName="SimpleQuest.QuestState.<NodePath>.Outcome.<X>",NewTagName="SimpleQuest.QuestState.<NodePath>.Path.<X>")
;
; Same shape applies to the EntryOutcome to EntryPath migration on inner-graph entries.
